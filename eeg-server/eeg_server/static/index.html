<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EEG DroneSim Dashboard</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="viz-root">
<header>
  <h1>EEG &rarr; DroneSim 평가 대시보드</h1>
  <div id="connection" class="status status-down">
    <span class="status-dot" aria-hidden="true"></span>
    <span id="connection-label">DroneSim 연결 대기중</span>
  </div>
</header>

<main>
  <section class="response-row" aria-label="응답 경로 및 통신 신뢰도">
    <article class="tile pipeline-tile" aria-label="응답 경로">
      <h2>응답 경로</h2>
      <div class="legend" id="pipeline-legend"></div>
      <div class="chart-wrap pipeline-chart-wrap">
        <canvas id="pipeline-chart"></canvas>
      </div>
      <p class="sub">전체 <span id="pipeline-total-ms">--</span> ms
         (mean: <span id="pipeline-mean-ms">--</span>, p95: <span id="pipeline-p95-ms">--</span>)</p>
    </article>
    <article class="tile">
      <h2>드론 제어 통신 신뢰도</h2>
      <p class="value"><span id="reliability">--</span><span class="unit">%</span></p>
      <p class="sub">frame <span id="frame-percent">--</span>% (<span id="frames-lost">0</span> lost)
         &middot; ack <span id="ack-percent">--</span>%</p>
    </article>
  </section>

  <section class="kpi-row" aria-label="추론 결과">
    <article class="tile action-tile">
      <h2>추론 결과</h2>
      <p class="action" id="inferred-action">-</p>
      <p class="sub">confidence <span id="confidence">--</span></p>
    </article>
  </section>

  <section class="tile chart-tile" aria-label="Action 확률 시계열">
    <h2>Action 확률 (최근 30초)</h2>
    <div class="legend" id="prob-legend"></div>
    <div class="chart-wrap">
      <canvas id="prob-chart"></canvas>
      <div id="prob-tooltip" class="tooltip" hidden></div>
    </div>
  </section>

  <section class="tile chart-tile" aria-label="EEG 신호">
    <h2>EEG 신호 (32 전극, 최근 2초)</h2>
    <canvas id="waveforms"></canvas>
  </section>
</main>

<footer>
  <p>eeg-server dummy &middot; 데이터는 500ms 간격으로 갱신됩니다.</p>
</footer>

<script src="/probchart.js"></script>
<script src="/pipelinechart.js"></script>
<script src="/app.js"></script>
</body>
</html>
